name: DevSecOps Code & Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security_audit:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull the latest repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Scan for exposed secrets (e.g., api keys left in HTML comments)
    - name: Secret Detection Scan
      uses: trufflesecurity/trufflehog-actions@main
      with:
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

    # Step 3: Lint the HTML code for syntax and structurally broken layouts
    - name: HTML Syntax and Lint Validation
      run: |
        sudo apt-get install -y tidy
        tidy -errors -quiet index.html || echo "Minor formatting recommendations found."
